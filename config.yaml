# All knobs in one place. train.py and overfit_check.py read this.

# --- Data ---
data_root: "MFCAD++_dataset"         # unzipped MFCAD++ folder (relative to repo root)
step_dir: "step_12class"              # relabeled STEP with 0–11 face names (baselines / LLM eval)
loader: "h5"                          # "h5" (recommended) or "step"
h5_format: "mfcadpp_regen"           # mfcadpp_regen = regenerated B-rep graphs (real dihedral + exact normals); mfcadpp = released H5; simple = one H5 per key
h5_dir: "hierarchical_graphs_regen_12"  # mfcadpp*: 12-class relabeled H5 (training/val/test *_MFCAD++.h5)
h5_path: "graphs.h5"                  # simple format only: single H5 relative to data_root
angle_reduce: "median"               # regen dedup: how to collapse a multi-edge face pair's per-edge dihedral angles (median|mean)
num_classes: 12                       # collapsed machining-feature classes (taxonomy.py)
num_surface_types: 6                  # plane, cylinder, cone, sphere, torus, other

# --- Model ---
hidden_dim: 128
num_layers: 4            # message-passing layers; 3-4 is the sweet spot for B-rep
dropout: 0.2
edge_dim: 4              # regen: 3 (convex/concave/smooth one-hot) + 1 cos(dihedral); node_in/edge_in are auto-derived from data at runtime

# --- Training ---
device: auto             # auto | cuda | mps | cpu
epochs: 60               # early stopping usually halts well before this
batch_size: 128          # graphs per batch; lower if you hit OOM
lr: 0.001
weight_decay: 0.0001
patience: 10             # early stop after N epochs with no val improvement
seed: 42
num_workers: 28          # >0 to keep the GPU fed; persistent_workers reuses them

# --- Output ---
out_dir: "runs"
